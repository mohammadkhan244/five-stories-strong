<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#DBCEB4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C4B49A" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#DBCEB4"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Giant // background mark -->
  <text
    x="600" y="500"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="580"
    font-weight="400"
    fill="#1F1B16"
    text-anchor="middle"
    opacity="0.05"
    letter-spacing="-0.02em"
  >//</text>

  <!-- Inset border -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#1F1B16" stroke-width="0.8" opacity="0.15"/>

  <!-- Top left: // + MODERN MYTHS -->
  <text x="56" y="82"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    fill="#8B4000"
    font-weight="400"
  >//</text>
  <text x="86" y="80"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#1F1B16"
    letter-spacing="4"
    opacity="0.55"
  >MODERN MYTHS</text>

  <!-- Top right: cohort label -->
  <text x="1144" y="80"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#1F1B16"
    text-anchor="end"
    letter-spacing="3"
    opacity="0.45"
  >A 5-WEEK COHORT</text>

  <!-- Main headline line 1 -->
  <text x="600" y="292"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="94"
    fill="#1F1B16"
    text-anchor="middle"
    font-weight="400"
  >Write Five Stories</text>

  <!-- Main headline line 2 -->
  <text x="600" y="392"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="94"
    fill="#1F1B16"
    text-anchor="middle"
    font-weight="400"
  >in Five Weeks</text>

  <!-- Divider rule -->
  <line x1="480" y1="424" x2="720" y2="424" stroke="#8B4000" stroke-width="1.2" opacity="0.9"/>

  <!-- Subline -->
  <text x="600" y="468"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="15"
    font-weight="300"
    fill="#8B4000"
    text-anchor="middle"
    letter-spacing="3"
  >FOR WRITERS WHO STOPPED TRUSTING THEIR OWN THINKING</text>

  <!-- Bottom label -->
  <text x="600" y="556"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    fill="#1F1B16"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.38"
  >AUGUST 2026</text>

</svg>
